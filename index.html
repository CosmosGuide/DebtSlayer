<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt-Slayer: Power-Up Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 font-sans">

    <header class="max-w-md mx-auto mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-orange-500 tracking-tighter uppercase italic">Debt-Slayer</h1>
            <p class="text-[10px] text-slate-500 font-bold">Auto-EMI + Manual Smash</p>
        </div>
        <div class="text-right">
            <p class="text-xs text-slate-400">Total Debt</p>
            <p id="totalOwed" class="text-xl font-bold text-red-500 font-mono">₹0</p>
        </div>
    </header>

    <section class="max-w-md mx-auto mb-8 bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-2xl">
        <div class="grid grid-cols-2 gap-3 mb-3">
            <input id="dName" type="text" placeholder="Loan Name" class="col-span-2 bg-slate-950 border border-slate-700 p-3 rounded-lg text-sm focus:border-orange-500 outline-none">
            <input id="dTotal" type="number" placeholder="Balance (₹)" class="bg-slate-950 border border-slate-700 p-3 rounded-lg text-sm focus:border-orange-500 outline-none">
            <input id="dEmi" type="number" placeholder="Monthly EMI (₹)" class="bg-slate-950 border border-slate-700 p-3 rounded-lg text-sm focus:border-orange-500 outline-none">
            <input id="dDate" type="number" min="1" max="31" placeholder="EMI Date (1-31)" class="bg-slate-950 border border-slate-700 p-3 rounded-lg text-sm focus:border-orange-500 outline-none">
            <button onclick="addNewDebt()" class="col-span-2 bg-orange-600 hover:bg-orange-500 text-white font-black py-3 rounded-lg text-xs uppercase transition-all active:scale-95">
                ⚔️ Forge New Quest
            </button>
        </div>
        <button onclick="applySnowball()" class="w-full text-blue-400 py-1 text-[10px] font-bold hover:underline">
            RE-SORT BY SNOWBALL (Smallest First)
        </button>
    </section>

    <div id="list" class="max-w-md mx-auto space-y-4 pb-20"></div>

    <script>
        let debts = JSON.parse(localStorage.getItem('slayer_v3')) || [];

        function addNewDebt() {
            const name = document.getElementById('dName').value;
            const total = parseFloat(document.getElementById('dTotal').value);
            const emi = parseFloat(document.getElementById('dEmi').value);
            const date = parseInt(document.getElementById('dDate').value);

            if(!name || isNaN(total)) return alert("Please enter valid debt details.");

            debts.push({
                id: Date.now(),
                name,
                currentBalance: total,
                originalBalance: total,
                emi,
                emiDay: date,
                lastProcessedMonth: new Date().getMonth(),
                lastProcessedYear: new Date().getFullYear()
            });

            saveAndRender();
            // Reset inputs
            ['dName', 'dTotal', 'dEmi', 'dDate'].forEach(id => document.getElementById(id).value = '');
        }

        // AUTO-REDUCTION LOGIC
        function autoProcess() {
            const now = new Date();
            const cm = now.getMonth();
            const cy = now.getFullYear();
            const cd = now.getDate();
            let updated = false;

            debts = debts.map(d => {
                // If current day is >= EMI day AND we haven't processed this month yet
                if (cd >= d.emiDay && (d.lastProcessedMonth !== cm || d.lastProcessedYear !== cy)) {
                    d.currentBalance = Math.max(0, d.currentBalance - d.emi);
                    d.lastProcessedMonth = cm;
                    d.lastProcessedYear = cy;
                    updated = true;
                }
                return d;
            });
            if(updated) saveAndRender();
        }

        function smashDebt(id) {
            const amount = prompt("How much extra ₹ would you like to pay right now?");
            if (amount && !isNaN(amount)) {
                const idx = debts.findIndex(d => d.id === id);
                debts[idx].currentBalance = Math.max(0, debts[idx].currentBalance - parseFloat(amount));
                
                // Visual reward
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.8 },
                    colors: ['#22c55e', '#f97316', '#ffffff']
                });
                
                saveAndRender();
            }
        }

        function applySnowball() {
            debts.sort((a, b) => a.currentBalance - b.currentBalance);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('slayer_v3', JSON.stringify(debts));
            const list = document.getElementById('list');
            const totalDisplay = document.getElementById('totalOwed');
            list.innerHTML = '';
            let grandTotal = 0;

            debts.forEach((d, idx) => {
                grandTotal += d.currentBalance;
                const progress = Math.min(100, ((d.originalBalance - d.currentBalance) / d.originalBalance) * 100);
                const isTarget = idx === 0 && d.currentBalance > 0;

                list.innerHTML += `
                    <div class="bg-slate-900 border ${isTarget ? 'border-orange-500 ring-1 ring-orange-500/50' : 'border-slate-800'} p-5 rounded-2xl relative">
                        ${isTarget ? '<span class="absolute -top-2 left-4 bg-orange-600 text-[8px] font-black px-2 py-0.5 rounded">PRIORITY TARGET</span>' : ''}
                        
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-lg">${d.name}</h3>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">EMI Date: ${d.emiDay}th</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-mono font-black text-white">₹${Math.round(d.currentBalance).toLocaleString('en-IN')}</p>
                                <p class="text-[9px] text-green-500 font-bold">EMI: ₹${d.emi}</p>
                            </div>
                        </div>

                        <div class="w-full bg-slate-800 h-3 rounded-full mb-4 overflow-hidden border border-slate-700">
                            <div class="bg-gradient-to-r from-red-500 via-orange-500 to-green-500 h-full transition-all duration-1000" style="width: ${progress}%"></div>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="smashDebt(${d.id})" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-black py-2 rounded-xl text-[10px] uppercase shadow-lg shadow-green-900/20">
                                💥 SMASH DEBT
                            </button>
                            <button onclick="deleteDebt(${d.id})" class="bg-slate-800 px-3 py-2 rounded-xl text-slate-500 hover:text-red-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            });

            totalDisplay.innerText = `₹${Math.round(grandTotal).toLocaleString('en-IN')}`;
        }

        function deleteDebt(id) {
            if(confirm("Abandon this quest?")) {
                debts = debts.filter(d => d.id !== id);
                saveAndRender();
            }
        }

        autoProcess();
        saveAndRender();
    </script>
</body>
</html>
